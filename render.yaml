services:
  - type: web
    name: salomon-ai
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install --upgrade pip setuptools wheel && pip install "numpy==1.26.4" && pip install -r requirements.txt && python -c "import numpy, fastapi, gunicorn; print('OK numpy', numpy.__version__)"
    startCommand: gunicorn app:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120 --graceful-timeout 30 --keep-alive 5 --access-logfile - --error-logfile -
    healthCheckPath: /api/salud
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SALOMON_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
