services:
  - type: web
    name: salomon-ai
    runtime: python
    plan: free
    rootDir: .
    # Mismo entorno virtual de Render: build + start comparten el venv del servicio.
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt && python -c "import numpy,fastapi,uvicorn,gunicorn; print('deps_ok', numpy.__version__)"
    # USAR $PORT (Render lo inyecta). Puerto fijo 10000 provoca 503 si PORT != 10000.
    startCommand: gunicorn app:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --graceful-timeout 30 --keep-alive 5 --access-logfile - --error-logfile -
    healthCheckPath: /api/salud
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SALOMON_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
