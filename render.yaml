services:
  - type: web
    name: salomon-ai
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt && python -c "import numpy; print('numpy_ok', numpy.__version__)"
    startCommand: pip install -r requirements.txt && gunicorn app:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /api/salud
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SALOMON_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
