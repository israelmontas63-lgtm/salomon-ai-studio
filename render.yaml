# Blueprint Render — Salomón AI v24 (arranque estable)
# Si el servicio ya existe en Dashboard, alinear Build/Start Command con este archivo.
services:
  - type: web
    name: salomon-ai
    runtime: python
    plan: free
    rootDir: .
    # Instala deps + verifica que gunicorn/uvicorn existan (evita exit 127)
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python -c "import gunicorn, uvicorn; print('gunicorn_ok', gunicorn.__version__)"
    # python -m gunicorn evita "gunicorn: not found" (PATH / exit 127)
    startCommand: python -m gunicorn app:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --graceful-timeout 30
    healthCheckPath: /api/salud
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SALOMON_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: TTS_ASYNC
        value: "false"
