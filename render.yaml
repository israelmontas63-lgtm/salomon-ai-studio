services:
  - type: web
    name: salomon-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Start Command (ASGI): gunicorn + UvicornWorker
    startCommand: gunicorn app:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SALOMON_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
