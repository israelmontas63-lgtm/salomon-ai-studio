# Blueprint Render — Salomón AI v95 Máxima Eficiencia (Free Tier Ultra-Light)
services:
  - type: web
    name: salomon-ai
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python -c "import gunicorn, uvicorn; print('gunicorn_ok', gunicorn.__version__)" && python -m compileall -q cognicion persistencia mente core views config cerebro.py app.py settings.py && python -c "from cognicion.eficiencia import estado_eficiencia; print('eficiencia', estado_eficiencia()['version'])" && python -c "from cognicion.capas_inteligencia.synaptic_bus import list_synapses; print('synaptic_ok', len(list_synapses()))" && python -c "from cognicion.core_salomon_api_arsenal_image_generator import obtener_arsenal; print('arsenal_ok', obtener_arsenal().STATUS)"
    startCommand: python -m gunicorn app:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 90 --graceful-timeout 20 --max-requests 120 --max-requests-jitter 20
    healthCheckPath: /api/salud
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: RENDER_FREE_TIER
        value: "true"
      - key: BOOT_LIGHT
        value: "true"
      - key: MEDIA_ASYNC_DEFAULT
        value: "true"
      - key: MEDIA_HTTP_TIMEOUT
        value: "45"
      - key: MAX_SESIONES_RAM
        value: "4"
      # Opcional: montar disco persistente y apuntar aquí (Free sin disco = efímero)
      - key: DATA_DIR
        value: "data"
      - key: COLSUB_MAX_AGENTES
        value: "2"
      - key: COLSUB_MAX_WORKERS
        value: "1"
      - key: COLSUB_RAM_CRITICO
        value: "68"
      - key: MEDIA_PROMPT_ENHANCER
        value: "true"
      - key: MEDIA_FORZAR_PRO
        value: "true"
      - key: SALOMON_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FLUX_API_KEY
        sync: false
      - key: FLUX_API_URL
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: CARTESIA_API_KEY
        sync: false
      - key: CARTESIA_VOICE_ID
        sync: false
      - key: CARTESIA_MODEL_ID
        value: "sonic-3.5"
      - key: TTS_ASYNC
        value: "true"
      # Adam Voice ID — case-sensitive ('n' minúscula en NInz; F en GcF)
      - key: ELEVENLABS_VOICE_ID
        value: "pNInz6obpgDQGcFmaJgB"
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: FAL_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: REPLICATE_API_KEY
        sync: false
