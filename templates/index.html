<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Salomón AI</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/static/assets/logo-ss.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/static/assets/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/styles.css" />
  <link rel="stylesheet" href="/static/css/boton.css" />
</head>
<body>
  <div class="phone">
    <header class="header">
      <div class="profiles">
        <button type="button" class="profile-btn" id="el-1" aria-label="Perfil">
          <img src="/static/assets/icon-user.svg" alt="" />
        </button>
        <button type="button" class="profile-btn" aria-label="Ajustes">
          <img src="/static/assets/icon-settings.svg" alt="" />
        </button>
      </div>

      <div class="brand">
        <div class="logo-ss" aria-label="Salomón AI">
          <img src="/static/assets/logo-ss.svg" alt="S S" />
        </div>
        <h1 class="brand-name">Salomón AI</h1>
      </div>

      <div class="header-spacer" aria-hidden="true"></div>
    </header>

    <main class="chat" id="chat" aria-label="Chat">
      <div class="bubble bot">Hola. Soy Salomón AI — precisión enciclopédica con gusto por el cine, la TV y la música.

¿Sobre qué obra quieres que profundice?</div>
    </main>

    <footer class="control-bar" id="control-bar">
      <div class="control-side">
        <button type="button" class="circle-btn" id="btn-aa" aria-label="Texto">Aa</button>
      </div>

      <!-- Smart Button: círculo central exacto 80px -->
      <button type="button" class="smart-button" id="smart-button" aria-label="Smart Button">
        <img class="smart-button__icon" src="/static/assets/icon-mic.svg" alt="" />
        <span class="smart-button__label">Smart Button</span>
      </button>

      <div class="control-side">
        <button type="button" class="circle-btn" id="btn-cam" aria-label="Cámara">
          <img src="/static/assets/icon-camera.svg" alt="" />
        </button>
      </div>

      <form class="composer composer--smart" id="form-chat" autocomplete="off">
        <button type="submit" class="btn-play" aria-label="Enviar">►</button>
        <input id="input-msg" type="text" placeholder="Escribe tu mensaje..." maxlength="4000" />
      </form>
    </footer>
  </div>

  <script src="/static/js/app.js" defer></script>
  <script src="/static/js/components/SmartButton.js" defer></script>
  <script src="/static/js/pwa-register.js" defer></script>
</body>
</html>
