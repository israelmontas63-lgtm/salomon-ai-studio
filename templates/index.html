<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0A0A0A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Salomón AI" />
  <title>Salomón AI</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/static/icons/favicon-32x32.png" type="image/png" sizes="32x32" />
  <link rel="icon" href="/static/icons/favicon-16x16.png" type="image/png" sizes="16x16" />
  <link rel="icon" href="/static/icons/android-chrome-192x192.png" type="image/png" sizes="192x192" />
  <link rel="icon" href="/static/icons/android-chrome-512x512.png" type="image/png" sizes="512x512" />
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png" sizes="180x180" />
  <meta name="msapplication-TileImage" content="/static/icons/mstile-150x150.png" />
  <meta name="msapplication-TileColor" content="#0A0A0A" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/styles.css" />
  <link rel="stylesheet" href="/static/css/global.css" />
  <link rel="stylesheet" href="/static/css/boton.css" />
  <link rel="stylesheet" href="/static/css/camera_overlay.css" />
  <link rel="stylesheet" href="/static/css/vision.css" />
  <link rel="stylesheet" href="/static/css/camera_toggle_ui.css" />
  <link rel="stylesheet" href="/static/css/input_styles.css" />
  <link rel="stylesheet" href="/static/css/update_styles.css" />
  <link rel="stylesheet" href="/static/css/settings_layer.css?v=110.22.25" />
  <link rel="stylesheet" href="/static/css/chat_history_drawer.css" />
  <link rel="stylesheet" href="/static/css/back_button.css?v=110.22.25" />
  <link rel="stylesheet" href="/static/css/bottom_bar_ux.css?v=110.22.25" />
  <link rel="stylesheet" href="/static/css/camera_full.css?v=110.22.25" />
  <link rel="stylesheet" href="/static/css/camera_hud.css?v=110.22.25" />
  <link rel="stylesheet" href="/static/css/ui_hit_repair.css?v=110.22.25" />
</head>
<body>
  <script>
    /* Limpieza inmediata de capas atascadas (antes de CSS diferido) */
    (function () {
      try {
        document.documentElement.classList.add("salomon-boot");
        if (document.body) {
          document.body.classList.remove(
            "vision-immersive",
            "vision-mode-active",
            "input-sheet-open",
            "control-layer-open",
            "chat-drawer-open",
            "ai-active",
            "salomon-processing",
            "camera-ui-elevated"
          );
        }
      } catch (e) {}
    })();
  </script>
  <div class="phone app-viewport">
    <header class="header">
      <!-- Estándar móvil: Back arriba-izquierda -->
      <div class="header-nav header-nav--start" id="header-nav-start">
        <button type="button" class="back-btn is-active" id="btn-nav-back" aria-label="Salir del sistema / Cerrar capa" data-ui-action="back" data-role="global-negative" data-brain-bind="1" onclick="window.__salomonTap&&__salomonTap.back();return false;">
          <svg class="back-btn__icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15.5 5.5L9 12l6.5 6.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <div class="brand">
        <div class="logo-ss" aria-label="Salomón AI">
          <img src="/static/assets/logo-ss.svg" alt="S S" />
        </div>
        <h1 class="brand-name">Salomón AI</h1>
      </div>

      <!-- Estándar móvil: Ajustes (tuerquita) arriba-derecha -->
      <div class="header-nav header-nav--end profiles" id="header-nav-end">
        <button type="button" class="profile-btn profile-btn--badge-host" id="btn-settings" aria-label="Herramientas" data-brain-bind="1" onclick="window.__salomonTap&&__salomonTap.settings();return false;">
          <img src="/static/assets/icon-settings.svg" alt="" />
          <span class="deploy-badge" id="deploy-badge" aria-hidden="true">
            <span class="deploy-badge__dot"></span>
            <span class="deploy-badge__card">Nueva</span>
          </span>
        </button>
      </div>
    </header>

    <main class="chat" id="chat" aria-label="Chat">
      <div class="bubble bot">Hola. Soy Salomón AI — precisión enciclopédica con gusto por el cine, la TV y la música.

¿Sobre qué obra quieres que profundice?</div>
    </main>

    <div class="camera-stage camera-container" id="camera-stage" aria-hidden="true">
      <video id="camera-video" playsinline muted></video>
      <!-- Controles de Cámara / Visor Estilo Alta Gama -->
      <div id="camera-controls-container" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9998;">
          <button id="btn-back" type="button" onclick="closeCamera()" style="position: absolute; top: 24px; left: 24px; pointer-events: auto; z-index: 9999; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 20px;">✕</button>
          <button id="btn-flip" type="button" onclick="flipCamera()" style="position: absolute; top: 24px; right: 24px; pointer-events: auto; z-index: 9999; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 20px;">🔄</button>
          <button id="btn-capture" type="button" onclick="captureImage()" style="position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%); pointer-events: auto; z-index: 9999; background: white; border: 4px solid rgba(0,0,0,0.3); border-radius: 50%; width: 72px; height: 72px; box-shadow: 0 4px 10px rgba(0,0,0,0.4);"></button>
      </div>
    </div>

    <!-- nav_bar_container: único HUD de controles (sin flotantes sobre el video) -->
    <footer
      class="bottom-dock control-bar nav-bar-container"
      id="nav_bar_container"
      data-role="nav"
    >
      <div class="dock-cam-btn control-side nav-bar__cluster" id="side-close">
        <div class="cam-wrap" id="cam-wrap">
          <button type="button" class="circle-btn" id="btn-cam" aria-label="Cámara" data-ui-action="camera" data-brain-bind="1" onclick="window.__salomonTap&&__salomonTap.cam();return false;">
            <img src="/static/assets/icon-camera.svg" alt="" />
          </button>
          <button type="button" class="btn-flip" id="btn-dock-flip" aria-label="Girar cámara" tabindex="-1" data-ui-action="flip" data-brain-bind="1" onclick="window.__salomonTap&&__salomonTap.flip();return false;">
            <img src="/static/assets/icon-flip.svg" alt="" />
          </button>
        </div>
      </div>

      <button type="button" class="dock-center-btn smart-button is-seamless" id="smart-button" aria-label="Salomón: toque = dictado · mantén = conversar · toque otra vez = salir" data-role="ai" data-trigger="trigger_ai_core" data-gesture-engine="seamless-smart-button" data-hold-ms="500" data-tap-max-ms="300" data-brain-bind="1" onclick="window.__salomonTap&&__salomonTap.smart();return false;">
        <span class="smart-button__glyph">S</span>
        <img class="smart-button__icon" src="/static/assets/icon-shutter.svg" alt="" hidden />
        <span class="smart-button__label">Salomón AI</span>
      </button>

      <div class="dock-text-btn control-side nav-bar__cluster" id="side-aa">
        <button type="button" class="circle-btn" id="btn-aa" aria-label="Texto" data-ui-action="aa_input" data-brain-bind="1" onclick="window.__salomonTap&&__salomonTap.aa();return false;">Aa</button>
      </div>
    </footer>

    <div class="input-layer" id="input-layer" aria-hidden="true">
      <form class="input-pill" id="form-chat" method="post" action="#" autocomplete="off" onsubmit="return false;">
        <input
          class="input-pill__field"
          id="input-msg"
          type="text"
          placeholder="Escribe tu mensaje..."
          maxlength="4000"
          enterkeyhint="send"
          autocomplete="off"
        />
        <button type="submit" class="input-send" id="input-send" aria-label="Enviar">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 5l11 7-11 7V5z" />
          </svg>
        </button>
      </form>
    </div>
  </div>

  <!-- Control Layer se inyecta en runtime por settings_manager.js (Z-Index máximo) -->

  <div class="update-toast" id="update-toast" role="status" aria-live="polite">
    <div class="update-toast__text">Hay una nueva versión disponible.</div>
    <button type="button" class="update-toast__btn" id="update-toast-btn">Actualizar</button>
  </div>

  <!-- SW eager: instalabilidad PWA no depende del lazy-loader -->
  <script>
    /* Globales obligatorias del visor (onclick inline del HUD) */
    window.closeCamera = function closeCamera() {
      if (window.SalomonCamera && window.SalomonCamera.closeCamera) {
        return window.SalomonCamera.closeCamera();
      }
    };
    window.flipCamera = function flipCamera() {
      if (window.SalomonCamera && window.SalomonCamera.flipCamera) {
        return window.SalomonCamera.flipCamera();
      }
    };
    window.captureImage = function captureImage() {
      if (window.SalomonCamera && window.SalomonCamera.disparar) {
        return window.SalomonCamera.disparar();
      }
    };
  </script>
  <script src="/static/js/pwa-register.js?v=110.22.25" defer></script>
  <!-- Reconexión neuronal SIN defer: binding inmediato al DOM -->
  <script src="/static/js/button_brain_bind.js?v=110.22.25"></script>
  <script src="/static/js/ui_boot_reconnect.js?v=110.22.25"></script>
  <script src="/static/js/bottom_bar_ux.js?v=110.22.25" defer></script>
  <script src="/static/js/main.js?v=110.22.25" defer></script>
</body>
</html>
