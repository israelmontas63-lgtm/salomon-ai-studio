<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#000000" />
  <title>Salomón AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --negro: #000000;
      --dorado: #D4AF37;
      --plata: #C0C0C0;
      --mostaza: #D4AF37;
      --mostaza-soft: #c9a227;
      --safe-t: env(safe-area-inset-top, 0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--negro);
      color: var(--plata);
      font-family: "Outfit", system-ui, sans-serif;
      overflow: hidden;
    }

    .phone {
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: var(--negro);
    }

    /* ——— HEADER ——— */
    .header {
      flex-shrink: 0;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: calc(14px + var(--safe-t)) 14px 12px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.35);
    }

    .profiles {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-start;
    }

    .profile-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid var(--dorado);
      background: var(--negro);
      color: var(--plata);
      display: grid;
      place-items: center;
      box-shadow: 0 3px 12px rgba(212, 175, 55, 0.2);
      cursor: pointer;
    }

    .profile-btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: var(--plata);
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .logo-ss {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid var(--dorado);
      background: var(--negro);
      color: var(--plata);
      display: grid;
      place-items: center;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.06em;
      box-shadow: 0 4px 16px rgba(212, 175, 55, 0.28);
    }

    .brand-name {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--dorado);
      letter-spacing: 0.03em;
    }

    .header-spacer { min-width: 1px; }

    /* ——— CHAT ——— */
    .chat {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px 14px calc(110px + var(--safe-b));
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bubble {
      max-width: 88%;
      padding: 12px 14px;
      font-size: 14.5px;
      line-height: 1.45;
      border-radius: 16px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* IA: mostaza/dorado + texto negro */
    .bubble.bot {
      align-self: flex-start;
      background: linear-gradient(160deg, #e0c15a 0%, #D4AF37 55%, #b8922a 100%);
      color: #000000;
      border: 1px solid rgba(212, 175, 55, 0.85);
      box-shadow: 0 4px 14px rgba(212, 175, 55, 0.25);
    }

    .bubble.bot a { color: #1a1a1a; text-decoration: underline; }

    /* Usuario: burbuja oscura + texto claro */
    .bubble.user {
      align-self: flex-end;
      background: #141414;
      color: var(--plata);
      border: 1px solid rgba(192, 192, 192, 0.35);
    }

    .bubble.typing {
      opacity: 0.75;
      font-style: italic;
    }

    /* ——— BARRA INFERIOR ——— */
    .control-bar {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: min(100%, 430px);
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 12px calc(14px + var(--safe-b));
      background: var(--negro);
      border-top: 1px solid rgba(212, 175, 55, 0.35);
    }

    .circle-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid var(--dorado);
      background: var(--negro);
      color: var(--plata);
      display: grid;
      place-items: center;
      box-shadow: 0 4px 14px rgba(212, 175, 55, 0.22);
      cursor: pointer;
      flex-shrink: 0;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 16px;
      font-weight: 700;
    }

    .circle-btn svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: var(--plata);
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .composer {
      flex: 1;
      min-width: 0;
      max-width: 260px;
      height: 48px;
      border-radius: 999px;
      border: 2px solid var(--dorado);
      background: linear-gradient(180deg, #1a1608 0%, #000 100%);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 8px 0 6px;
      box-shadow: 0 4px 16px rgba(212, 175, 55, 0.2);
    }

    .btn-play {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1.5px solid var(--dorado);
      background: var(--negro);
      color: var(--dorado);
      display: grid;
      place-items: center;
      flex-shrink: 0;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      padding-left: 2px;
    }

    .composer input {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--plata);
      font: inherit;
      font-size: 14px;
    }

    .composer input::placeholder {
      color: rgba(212, 175, 55, 0.55);
    }
  </style>
</head>
<body>
  <div class="phone">
    <header class="header">
      <div class="profiles">
        <button type="button" class="profile-btn" id="el-1" aria-label="Perfil">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="8" r="3.2" />
            <path d="M5 19c1.8-3.2 4-4.8 7-4.8S17.2 15.8 19 19" />
          </svg>
        </button>
        <button type="button" class="profile-btn" aria-label="Ajustes">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V20a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H4a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H10a1.7 1.7 0 0 0 1-1.5V4a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V10a1.7 1.7 0 0 0 1.5 1H20a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z" />
          </svg>
        </button>
      </div>

      <div class="brand">
        <div class="logo-ss" aria-label="Salomón AI">S S</div>
        <div class="brand-name">Salomón AI</div>
      </div>

      <div class="header-spacer"></div>
    </header>

    <main class="chat" id="chat" aria-label="Chat">
      <div class="bubble bot">Hola. Soy Salomón AI — precisión enciclopédica con gusto por el cine, la TV y la música.

¿Sobre qué obra quieres que profundice?</div>
    </main>

    <div class="control-bar">
      <button type="button" class="circle-btn" id="btn-cam" aria-label="Cámara">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 8h3l2-2h6l2 2h3v10H4V8z" />
          <circle cx="12" cy="13" r="3.2" />
        </svg>
      </button>

      <form class="composer" id="form-chat" autocomplete="off">
        <button type="submit" class="btn-play" aria-label="Enviar">►</button>
        <input id="input-msg" type="text" placeholder="Escribe tu mensaje..." maxlength="4000" />
      </form>

      <button type="button" class="circle-btn" id="btn-aa" aria-label="Texto">Aa</button>
    </div>
  </div>

  <script>
    (function () {
      const chat = document.getElementById("chat");
      const form = document.getElementById("form-chat");
      const input = document.getElementById("input-msg");
      let sessionId = localStorage.getItem("salomon_session_id") || null;
      let busy = false;

      function addBubble(text, role) {
        const el = document.createElement("div");
        el.className = "bubble " + (role === "user" ? "user" : "bot");
        el.textContent = text;
        chat.appendChild(el);
        chat.scrollTop = chat.scrollHeight;
        return el;
      }

      async function sendMessage(mensaje) {
        const msg = (mensaje || "").trim();
        if (!msg || busy) return;
        busy = true;
        addBubble(msg, "user");
        input.value = "";
        const typing = addBubble("Pensando…", "bot");
        typing.classList.add("typing");

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ mensaje: msg, session_id: sessionId }),
          });
          const data = await res.json().catch(function () { return {}; });
          typing.remove();
          if (data.session_id) {
            sessionId = data.session_id;
            localStorage.setItem("salomon_session_id", sessionId);
          }
          if (res.ok && data.texto) {
            addBubble(data.texto, "bot");
          } else {
            addBubble(
              data.detail
                ? String(data.detail)
                : "No pude completar la respuesta. ¿Lo intentamos de nuevo?",
              "bot"
            );
          }
        } catch (err) {
          typing.remove();
          addBubble("Hubo un problema de conexión. ¿Reintentamos?", "bot");
        } finally {
          busy = false;
          input.focus();
        }
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        sendMessage(input.value);
      });

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) { r.unregister(); });
        });
      }
    })();
  </script>
</body>
</html>
