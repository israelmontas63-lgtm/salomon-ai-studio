<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#000000" />
  <title>Salomón AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --negro: #000000;
      --dorado: #D4AF37;
      --plata: #C0C0C0;
      --muted: rgba(192, 192, 192, 0.45);
      --sombra: 0 4px 16px rgba(212, 175, 55, 0.22);
      --safe-t: env(safe-area-inset-top, 0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--negro);
      color: var(--plata);
      font-family: "Outfit", system-ui, sans-serif;
      overflow: hidden;
    }

    .phone {
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: var(--negro);
      position: relative;
    }

    /* ——— HEADER ——— */
    .header {
      position: relative;
      flex-shrink: 0;
      padding: calc(18px + var(--safe-t)) 16px 18px;
      min-height: 150px;
    }

    .btn-tools {
      position: absolute;
      top: calc(18px + var(--safe-t));
      left: 18px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--dorado);
      background: var(--negro);
      color: var(--plata);
      display: grid;
      place-items: center;
      box-shadow: var(--sombra);
      cursor: pointer;
    }

    .btn-tools svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: var(--plata);
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding-top: 4px;
    }

    .tag-12 {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--plata);
      margin-bottom: 6px;
      opacity: 0.85;
    }

    .logo-s {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid var(--dorado);
      background: var(--negro);
      color: var(--plata);
      display: grid;
      place-items: center;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 40px;
      font-weight: 600;
      line-height: 1;
      box-shadow: var(--sombra);
    }

    .brand-name {
      margin-top: 10px;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--plata);
    }

    /* ——— CHAT ——— */
    .chat {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 8px 16px calc(130px + var(--safe-b));
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bubble {
      max-width: 84%;
      padding: 12px 14px;
      font-size: 15px;
      line-height: 1.45;
      border-radius: 14px;
    }

    .bubble.bot {
      align-self: flex-start;
      color: var(--plata);
      border: 1px solid rgba(212, 175, 55, 0.55);
      background: rgba(212, 175, 55, 0.06);
    }

    .bubble.user {
      align-self: flex-end;
      color: var(--plata);
      border: 1px solid rgba(192, 192, 192, 0.45);
      background: rgba(192, 192, 192, 0.06);
    }

    /* ——— FOOTER: Cámara | Input | Envío ——— */
    .control-bar {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: min(100%, 430px);
      z-index: 50;
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 18px 14px calc(16px + var(--safe-b));
      background: var(--negro);
      border-top: 1px solid rgba(212, 175, 55, 0.35);
    }

    .bloque {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border: 2px solid var(--dorado);
      background: var(--negro);
      box-shadow: var(--sombra);
      color: var(--plata);
    }

    .bloque-a {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .bloque-a .camara {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      color: var(--plata);
      cursor: pointer;
      border-radius: 50%;
    }

    .bloque-a .camara svg,
    .bloque-a .giro svg,
    .bloque-b .micro svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: var(--plata);
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .bloque-a .giro {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 10px);
      transform: translateX(-50%);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid var(--dorado);
      background: var(--negro);
      box-shadow: var(--sombra);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--plata);
      cursor: pointer;
      padding: 0;
    }

    .bloque-a .giro svg { width: 16px; height: 16px; }

    .bloque-b {
      width: min(240px, 52vw);
      height: 56px;
      border-radius: 999px;
      flex-direction: row;
      gap: 10px;
      padding: 0 10px 0 8px;
      flex-shrink: 0;
    }

    .bloque-b .micro {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--dorado);
      background: var(--negro);
      box-shadow: var(--sombra);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--plata);
      cursor: pointer;
      padding: 0;
    }

    .bloque-b .micro svg { width: 18px; height: 18px; }

    .bloque-b .campo {
      flex: 1;
      min-width: 0;
      border: none;
      background: transparent;
      color: var(--plata);
      font-family: inherit;
      font-size: 15px;
      outline: none;
    }

    .bloque-b .campo::placeholder { color: var(--muted); }

    .bloque-c {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      flex-shrink: 0;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--plata);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="phone">
    <header class="header">
      <button type="button" class="btn-tools" id="el-1" aria-label="Ajustes">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V20a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H4a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H10a1.7 1.7 0 0 0 1-1.5V4a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V10a1.7 1.7 0 0 0 1.5 1H20a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z" />
        </svg>
      </button>

      <div class="brand">
        <div class="tag-12">12</div>
        <div class="logo-s" id="el-12" aria-label="Salomón">S</div>
        <div class="brand-name">Salomón AI</div>
      </div>
    </header>

    <main class="chat" id="el-2" aria-label="Chat">
      <div class="bubble bot">Hola, soy Salomón.<br />¿En qué te ayudo?</div>
      <div class="bubble user">Muéstrame el diseño final</div>
      <div class="bubble bot">Listo. Esta es la interfaz Premium.</div>
    </main>

    <div class="control-bar" id="control-bar">
      <div class="bloque bloque-a" id="el-3" data-bloque="A">
        <button type="button" class="giro" id="el-7" aria-label="Girar cámara">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 12a8 8 0 0 1 13.5-5.8" />
            <path d="M17 4v4h-4" />
            <path d="M20 12a8 8 0 0 1-13.5 5.8" />
            <path d="M7 20v-4h4" />
          </svg>
        </button>
        <button type="button" class="camara" aria-label="Cámara">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 8h3l2-2h6l2 2h3v10H4V8z" />
            <circle cx="12" cy="13" r="3.2" />
          </svg>
        </button>
      </div>

      <div class="bloque bloque-b" id="el-5" data-bloque="B">
        <button type="button" class="micro" id="el-4" aria-label="Micrófono">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="9" y="3" width="6" height="11" rx="3" />
            <path d="M6 11a6 6 0 0 0 12 0" />
            <path d="M12 17v4" />
            <path d="M9 21h6" />
          </svg>
        </button>
        <input class="campo" type="text" placeholder="Escribe a Salomón…" aria-label="Mensaje" />
      </div>

      <button type="button" class="bloque bloque-c" id="el-6" data-bloque="C" aria-label="Enviar">S</button>
    </div>
  </div>

  <script>
    (function () {
      if (!("serviceWorker" in navigator)) return;
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
      if (window.caches && caches.keys) {
        caches.keys().then(function (keys) {
          keys.forEach(function (k) { caches.delete(k); });
        });
      }
    })();
  </script>
</body>
</html>
