<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Salomón">
  <defs>
    <linearGradient id="oroBorde" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="45%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="oroLetras" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <radialGradient id="fondoMetal" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#2C2C2C"/>
      <stop offset="55%" stop-color="#1F1F1F"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </radialGradient>
    <filter id="brilloSuave" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="b"/>
      <feOffset dx="0" dy="1" in="b" result="o"/>
      <feMerge>
        <feMergeNode in="o"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Disco circular -->
  <circle cx="256" cy="256" r="248" fill="url(#fondoMetal)"/>
  <!-- Anillo dorado brillante -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="url(#oroBorde)" stroke-width="18"/>
  <circle cx="256" cy="256" r="232" fill="none" stroke="#FFD700" stroke-opacity="0.22" stroke-width="2"/>

  <!-- Dos S entrelazadas (caminos tipográficos minimalistas) -->
  <g filter="url(#brilloSuave)" fill="none" stroke="url(#oroLetras)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <!-- S izquierda (ligeramente desplazada) -->
    <path d="M 210 155
             C 150 155, 140 210, 180 230
             C 230 255, 250 270, 210 300
             C 160 335, 150 375, 210 375"/>
    <!-- S derecha (entrelazada, offset) -->
    <path d="M 302 155
             C 242 155, 232 210, 272 230
             C 322 255, 342 270, 302 300
             C 252 335, 242 375, 302 375"/>
  </g>
  <!-- Refuerzo fino interno de las S -->
  <g fill="none" stroke="#FFD700" stroke-opacity="0.35" stroke-width="6" stroke-linecap="round">
    <path d="M 210 162 C 158 162, 150 208, 186 226 C 232 250, 248 268, 214 296 C 168 328, 160 368, 210 368"/>
    <path d="M 302 162 C 250 162, 242 208, 278 226 C 324 250, 340 268, 306 296 C 260 328, 252 368, 302 368"/>
  </g>
</svg>
